// Toast
function showToast(msg,type){
  type=type||'info';var c=document.getElementById('toast-container');
  var t=document.createElement('div');t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  setTimeout(function(){t.classList.add('fade-out');},2500);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2800);
}

function setSyncStatus(text,online){
  document.getElementById('sync-status').textContent=text;
  var dot=document.getElementById('status-dot');
  if(online)dot.classList.remove('off');else dot.classList.add('off');
}

async function loadRemoteState(){
  if(!sb)return;
  try{
    var res=await sb.from('todo_states').select('*');
    if(res.error)throw res.error;
    remoteState={};
    res.data.forEach(function(row){
      remoteState[row.todo_id]=row;
      if(row.completed){state[row.todo_id]=true;}else{delete state[row.todo_id];}
      if(row.note){state['note-'+row.todo_id]=row.note;}else{delete state['note-'+row.todo_id];}
    });
    saveState();supabaseReady=true;setSyncStatus('✅ 已同步 · 实时',true);
    render();showToast('已同步 '+res.data.length+' 条状态','info');
  }catch(e){console.warn('Remote load fail',e);supabaseReady=false;setSyncStatus('⚠️ 离线模式',false);}
}

async function upsertRemote(todoId,completed,note){
  if(!sb||!currentIdentity)return false;
  var row=remoteState[todoId]||{};
  var payload={todo_id:todoId,completed:!!completed,note:note!==undefined?note:(row.note||''),
    completed_by:completed?currentIdentity:'',completed_at:completed?new Date().toISOString():null,
    updated_at:new Date().toISOString()};
  if(!completed){payload.completed_by='';payload.completed_at=null;}
  try{
    var res=await sb.from('todo_states').upsert(payload,{onConflict:'todo_id'});
    if(res.error)throw res.error;remoteState[todoId]=payload;return true;
  }catch(e){console.error('Upsert fail',e);return false;}
}

async function writeLog(todoId,action,detail){
  if(!sb||!currentIdentity)return;
  try{await sb.from('todo_logs').insert({todo_id:todoId,action:action,user_identity:currentIdentity,detail:detail||''});}catch(e){console.warn('Log fail',e);}
}

function subscribeRealtime(){
  if(!sb)return;
  try{
    sb.channel('todo-ch').on('postgres_changes',{event:'*',schema:'public',table:'todo_states'},function(payload){
      var r=payload.new||payload.old;if(!r||r.todo_id===undefined)return;
      var tid=r.todo_id;
      if(payload.eventType==='DELETE'){delete remoteState[tid];}
      else{remoteState[tid]=r;}
      if(r.completed)state[tid]=true;else delete state[tid];
      if(r.note)state['note-'+tid]=r.note;else delete state['note-'+tid];
      saveState();render();
    }).on('postgres_changes',{event:'INSERT',schema:'public',table:'todo_logs'},function(){loadLogs();})
    .subscribe();
  }catch(e){console.warn('RT sub fail',e);}
}

async function loadLogs(){
  if(!sb)return;
  try{
    var res=await sb.from('todo_logs').select('*').order('created_at',{ascending:false}).limit(20);
    if(res.error)throw res.error;renderLogs(res.data);
  }catch(e){console.warn('Logs fail',e);}
}

function renderLogs(logs){
  var el=document.getElementById('log-list'),empty=document.getElementById('log-empty');
  if(!logs||!logs.length){empty.style.display='block';el.innerHTML='';return;}
  empty.style.display='none';
  el.innerHTML=logs.map(function(l){
    var item=ITEM_MAP[l.todo_id];var txt=item?item.text.substring(0,25)+'…':'任务#'+l.todo_id;
    var act='';if(l.action==='complete')act='✅ 完成了';else if(l.action==='uncomplete')act='↩️ 取消完成';
    else if(l.action==='note')act=l.detail?'📝 更新备注':'🗑️ 清除备注';
    var d=new Date(l.created_at);var ts=padZ(d.getHours())+':'+padZ(d.getMinutes());
    var ds=(d.getMonth()+1)+'/'+d.getDate();
    return '<div class="log-item"><span class="log-time">'+ds+' '+ts+'</span><span class="log-user">'+escHtml(l.user_identity)+'</span><span class="log-action">'+act+' 「'+escHtml(txt)+'」</span></div>';
  }).join('');
}

function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Note toggle
function toggleNote(todoId){
  openNotes[todoId]=!openNotes[todoId];
  var el=document.getElementById('note-area-'+todoId);
  if(el){el.classList.toggle('open',openNotes[todoId]);
    if(openNotes[todoId]){var ta=el.querySelector('textarea');if(ta){ta.value=state['note-'+todoId]||'';ta.focus();}}}
}

function onBlurNote(todoId){
  var ta=document.querySelector('#note-area-'+todoId+' textarea');
  if(!ta)return;var val=ta.value.trim();
  var old=state['note-'+todoId]||'';
  if(val===old)return;
  saveNote(todoId,val);
}

function saveNote(todoId,note){
  state['note-'+todoId]=note;saveState();
  var row=remoteState[todoId]||{completed:!!state[todoId]};
  upsertRemote(todoId,row.completed,note);
  writeLog(todoId,'note',note?'更新备注':'清除备注');
}

// Existing helper functions
function ownerTagClass(o){
  var m={'老王':'tag-lw','凯哥':'tag-kg','阿超':'tag-ac','老王+凯哥':'tag-lw-kg','凯哥+阿超':'tag-kg-ac','老王+阿超':'tag-lw-ac'};
  return m[o]||'tag-normal';
}

function matchFilter(item){
  if(filters.status==='urgent'&&(item.tag!=='紧急'||state[item.id]))return false;
  if(filters.status==='pending'&&state[item.id])return false;
  if(filters.status==='done'&&!state[item.id])return false;
  if(filters.owner!=='all'){
    if(item.owner===filters.owner)return true;
    var both=filters.owner.split('+');
    if(both.length===2&&item.owner.indexOf(both[0])>=0&&item.owner.indexOf(both[1])>=0)return true;
    return false;
  }
  return true;
}

function formatCompletedBy(todoId){
  var r=remoteState[todoId];
  if(!r||!r.completed_by||!r.completed_at)return '';
  var d=new Date(r.completed_at);
  var ts=padZ(d.getHours())+':'+padZ(d.getMinutes());
  var ds=(d.getMonth()+1)+'/'+d.getDate();
  return '<span class="completed-by-tag" title="'+escHtml(r.completed_by)+' 于 '+ds+' '+ts+' 完成">✓ '+escHtml(r.completed_by)+' '+ts+'</span>';
}

function render(){
  var total=0,done=0,urgent=0;
  DATA.sections.forEach(function(s){s.items.forEach(function(item){
    total++;if(state[item.id])done++;if(item.tag==='紧急'&&!state[item.id])urgent++;
  });});
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-pending').textContent=total-done;
  document.getElementById('stat-urgent').textContent=urgent;
  document.getElementById('progress-fill').style.width=(total?(done/total*100):0)+'%';

  var el=document.getElementById('sections');el.innerHTML='';
  DATA.sections.forEach(function(section){
    var filtered=section.items.filter(matchFilter);
    if(!filtered.length)return;
    var collapsed=state['c-'+section.id];
    var pending=filtered.filter(function(i){return !state[i.id];}).length;
    var d=document.createElement('div');d.className='section';
    var itemsHtml=filtered.map(function(item){
      var isDone=!!state[item.id];
      var noteText=state['note-'+item.id]||'';
      var noteOpen=openNotes[item.id];
      var noteHtml='<div class="todo-note-area'+(noteOpen?' open':'')+'" id="note-area-'+item.id+'">'
        +'<textarea placeholder="添加备注..." onblur="onBlurNote('+item.id+')">'+escHtml(noteText)+'</textarea>'
        +'<div class="note-hint">失焦自动保存</div></div>';
      return '<div class="todo-item '+(isDone?'done':'')+'" onclick="toggleNote('+item.id+')" data-id="'+item.id+'">'
        +'<div class="todo-checkbox '+(isDone?'checked':'')+'" onclick="event.stopPropagation();toggleItem('+item.id+')" title="'+(isDone?'标记为未完成':'标记为完成')+'"></div>'
        +'<div class="todo-content"><div class="todo-text">'+escHtml(item.text)+'</div>'
        +'<div class="todo-meta">'
        +'<span class="todo-tag '+ownerTagClass(item.owner)+'">👤 '+item.owner+'</span>'
        +(item.tag==='紧急'?'<span class="todo-tag tag-urgent">🔥 紧急</span>':'<span class="todo-tag tag-normal">📋 普通</span>')
        +(item.date?'<span class="todo-tag tag-date">📅 '+item.date+'</span>':'')
        +(isDone?'<span class="todo-tag tag-done">✅ 完成</span>':'')
        +formatCompletedBy(item.id)
        +(noteText?'<span class="note-toggle-btn" onclick="event.stopPropagation();toggleNote('+item.id+')" title="有备注">📝</span>':'')
        +'</div></div>'
        +'<div class="todo-actions">'
        +'<button class="todo-btn" onclick="event.stopPropagation();toggleNote('+item.id+')" title="备注">📝</button>'
        +'<button class="todo-btn delete" onclick="event.stopPropagation();deleteItem('+item.id+')" title="删除">✕</button>'
        +'</div></div>'
        +noteHtml;
    }).join('');
    d.innerHTML='<div class="section-header" onclick="toggleSection(\''+section.id+'\')">'
      +'<div class="section-title"><div class="section-icon" style="background:'+section.color+'20;color:'+section.color+'">'+section.icon+'</div>'
      +'<h2>'+section.title+'</h2></div>'
      +'<div style="display:flex;align-items:center;gap:10px"><span class="section-count">'+pending+'/'+section.items.length+'</span>'
      +'<span class="section-toggle '+(collapsed?'collapsed':'')+'">▼</span></div></div>'
      +'<div class="section-body '+(collapsed?'collapsed':'')+'" id="section-'+section.id+'">'+itemsHtml+'</div>';
    el.appendChild(d);
  });

  document.getElementById('timeline').innerHTML='<h2>📅 重要时间节点</h2>'
    +DATA.timeline.map(function(t){return '<div class="timeline-item"><div class="timeline-dot '+t.type+'">'+(t.type==='soon'?'⚡':'📌')+'</div>'
      +'<div class="timeline-info"><div class="timeline-date">'+t.date+'</div><div class="timeline-text">'+t.text+'</div></div></div>';}).join('');

  document.getElementById('quotes').innerHTML='<h2>💬 关键原话</h2>'
    +DATA.quotes.map(function(q){return '<div class="quote-item"><div class="quote-text">"'+escHtml(q.text)+'"</div><div class="quote-label">'+q.label+'</div></div>';}).join('');
}

async function toggleItem(id){
  if(!currentIdentity||currentIdentity==='旁观者'){showToast(currentIdentity?'旁观者无法操作':'请先选择身份','error');return;}
  var wasDone=!!state[id];
  var newDone=!wasDone;
  // Optimistic update
  if(newDone)state[id]=true;else delete state[id];
  saveState();render();
  // Write to Supabase
  if(supabaseReady){
    var ok=await upsertRemote(id,newDone);
    if(!ok){
      // Rollback
      if(wasDone)state[id]=true;else delete state[id];
      saveState();render();showToast('同步失败，已回滚','error');return;
    }
    await writeLog(id,newDone?'complete':'uncomplete','');
    showToast(newDone?'已完成 ✓':'已取消','success');
  }else{
    showToast('离线模式：仅本地保存','info');
  }
}

function toggleSection(id){state['c-'+id]=!state['c-'+id];saveState();render();}
function deleteItem(id){
  if(!confirm('确认删除？'))return;
  DATA.sections.forEach(function(s){s.items=s.items.filter(function(i){return i.id!==id;});});
  delete state[id];saveState();render();
  if(supabaseReady&&sb){sb.from('todo_states').delete().eq('todo_id',id).then(function(){});}
}
function setFilter(type,val){
  filters[type]=val;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(event&&event.target)event.target.classList.add('active');
  render();
}
function toggleLogPanel(){
  logsCollapsed=!logsCollapsed;
  document.getElementById('log-body').classList.toggle('collapsed',logsCollapsed);
  document.getElementById('log-toggle').classList.toggle('collapsed',logsCollapsed);
  if(!logsCollapsed)loadLogs();
}

// Init
initIdentity();
render();
if(sb){
  setSyncStatus('同步中...','true');
  loadRemoteState().then(function(){
    subscribeRealtime();
    loadLogs();
  });
}else{
  setSyncStatus('⚠️ 离线模式',false);
}
</script>
</body>
</html>
